version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: documind-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - SECRET_KEY=${SECRET_KEY:-replace-this-with-a-very-long-secret-key-min-32-chars}
      - DATABASE_URL=sqlite+aiosqlite:///./data/documind.db
      - CHROMA_PERSIST_DIR=./data/chroma
      - STORAGE_LOCAL_PATH=./data/uploads
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: documind-frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      # Browser-visible URL — must be reachable from the user's machine
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      # Server-side rewrite target — uses Docker internal hostname
      - BACKEND_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    container_name: documind-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: documind
      POSTGRES_PASSWORD: password
      POSTGRES_DB: documind
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  data:
  pgdata:
